<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Runner</title>
  </head>
  <body>
    <style>
      body {
        color: #fafafa;
        background-color: #1e1e1e;
      }
      input,
      textarea {
        background-color: #3e3e3e;
        color: #fafafa;
        padding: 0.4rem 0.6rem 0.4rem 0.6rem;
        font-family: monospace;
      }
      button {
        background-color: #3e3e3e;
        color: #fafafa;
        padding: 0.4rem 0.6rem 0.4rem 0.6rem;
        width: fit-content;
      }
    </style>
    <form
      id="qwer"
      method="GET"
      style="display: flex; flex-direction: column; gap: 1rem"
    >
      <label for="cwd">
        cwd&nbsp;
        <input type="text" id="cwd" name="cwd" value="~" />
      </label>
      <textarea rows="32" cols="64" name="code"></textarea>
      <button>Submit</button>
    </form>
    <div id="output-container" />
    <script>
      const form = document.getElementById("qwer");
      const out = document.getElementById("output-container");
      async function handleSubmit(e) {
        e.preventDefault();
        const formData = new FormData(form);
        const code = formData.get("code");
        const cwd = formData.get("cwd");
        const sp = new URLSearchParams({ code, cwd });
        const url = `/cpp?${sp.toString()}`;
        const res = await fetch(url);
        const text = await res.text();
        console.log(text);
        const o = document.createElement("div");
        o.innerText = text;
        out.appendChild(o);
      }
      form.addEventListener("submit", handleSubmit);
    </script>
  </body>
</html>
